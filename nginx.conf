worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Include standard MIME types (text/html for .html, etc.)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Required for WebGPU SharedArrayBuffer support
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # SPA fallback — all routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Vite content-hashed bundles — safe to cache forever (URL changes on rebuild)
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }

        # WASM and JS glue — no content hash in URL, must revalidate on every request
        location ~* \.(wasm)$ {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }

        # wasm_exec.js — no content hash, must revalidate
        location = /wasm_exec.js {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }
    }
}

