worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Include standard MIME types (text/html for .html, etc.)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Add WASM MIME type (not in standard mime.types)
    types {
        application/wasm wasm;
    }

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Required for WebGPU SharedArrayBuffer support
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # SPA fallback — all routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache hashed static assets forever
        location ~* \.(js|css|png|jpg|svg|ico|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
        }
    }
}

