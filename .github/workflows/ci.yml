name: CI

on:
  push:
    branches: [main, project-scaffold]
  pull_request:
    branches: [main]

jobs:
  go-wasm:
    name: Build Go WASM + Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run Go tests
        working-directory: wasm
        run: go test ./...

      - name: Build WASM
        working-directory: wasm
        run: GOOS=js GOARCH=wasm go build -o ../public/terrain.wasm .

      - name: Verify WASM exists
        run: test -f public/terrain.wasm && echo "terrain.wasm built successfully"

  vite-build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: go-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
