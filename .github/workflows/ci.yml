name: CI

on:
  push:
    branches: [main, project-scaffold]
  pull_request:
    branches: [main]

jobs:
  go-wasm:
    name: Build Go WASM + Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go tests
        working-directory: wasm
        run: go test ./...

      - name: Build WASM
        working-directory: wasm
        run: GOOS=js GOARCH=wasm go build -o ../public/terrain.wasm .

      - name: Verify WASM output
        run: test -f public/terrain.wasm && echo "terrain.wasm built successfully"

  vite-build:
    name: Vite Build (Node 24)
    runs-on: ubuntu-latest
    needs: go-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false
          tags: terrain-webgpu:ci

