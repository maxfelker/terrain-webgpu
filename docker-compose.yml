services:
  dev:
    build:
      context: .
      target: dev
    image: terrain-webgpu:dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true

  prod:
    build:
      context: .
      target: production
    image: terrain-webgpu:prod
    ports:
      - "8080:80"
