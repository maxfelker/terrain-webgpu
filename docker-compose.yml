services:
  # Development server with hot reload
  dev:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

  # Production build served via nginx
  app:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    profiles:
      - production
